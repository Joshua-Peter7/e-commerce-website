spring:
  application:
    name: ecommerce-backend
  datasource:
    url: jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ecommerce_super_secret_jwt_key_2024_production_grade_256bit_minimum
    expiration: 86400000  # 24 hours in ms

logging:
  level:
    com.ecommerce: INFO
    org.springframework.security: WARN
